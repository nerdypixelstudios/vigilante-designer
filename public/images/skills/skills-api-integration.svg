<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="apig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Left node -->
  <circle cx="12" cy="32" r="10" fill="url(#apig)"/>
  <!-- Right node -->
  <circle cx="52" cy="32" r="10" fill="url(#apig)"/>
  <!-- Connecting line -->
  <line x1="22" y1="32" x2="42" y2="32" stroke="url(#apig)" stroke-width="4" stroke-linecap="round"/>
  <!-- Centre plug dot -->
  <circle cx="32" cy="32" r="5" fill="white"/>
  <!-- Pin ticks on left node -->
  <line x1="8" y1="27" x2="8" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="27" x2="13" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Pin ticks on right node -->
  <line x1="49" y1="37" x2="49" y2="41" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="37" x2="54" y2="41" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>